# .goal/config.yml — 由 /goal-init 生成，可手改
progress_file: progress.json
plans_dir: docs/plans
check_command: "python check_progress.py"
test_command: "pytest -x --tb=short"
lint_commands:
  - "ruff check ."
  - "ruff format --check ."
min_test_count: 8
max_rounds: 120
commit_prefix: "task"
forbid_patterns:
  - "stub"
  - "echo"
  - "placeholder"
  - "TODO"
  - "FIXME"
  - "NotImplemented"
  - "pass  #"
  - "raise NotImplementedError"
