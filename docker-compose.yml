# task-19：完整的博客部署栈（postgres + redis + blog）
#
# 启动：docker compose up -d
# 停止：docker compose down
# 查日志：docker compose logs -f blog

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
      POSTGRES_DB: blog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "blog", "-d", "blog"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    restart: unless-stopped

  blog:
    build: .
    image: blog-api:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://blog:blog@postgres:5432/blog"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "change-me-in-production-via-env"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      DEBUG: "false"
      INIT_DB_ON_STARTUP: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
